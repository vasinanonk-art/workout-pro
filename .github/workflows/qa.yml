name: Workout PRO QA

on:
  push:
    branches:
      - v6-dev
  pull_request:
    branches:
      - main
      - v6-dev

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run QA
        run: npm run qa
